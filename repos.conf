# BAR Development Workspace - Repository Configuration
#
# Format:  directory  url  branch  feature  [local_path]
#
# repos.local.conf (gitignored) overrides rows but has no feature column --
# its format is:  directory  url  branch  [local_path]
# `feature` is owned here. See README.md for the full format, the
# @local_root / @protocol directives, and examples.
#
# URLs point at the Serpensor team forks. Upstreams are added as a second
# remote per-repo for pulling updates. See TEAM-SETUP.md.

# ---------------------------------------------------------------------------
# bar — BAR game content + bar-lobby client
# ---------------------------------------------------------------------------

Beyond-All-Reason    https://github.com/Serpensor/Beyond-All-Reason.git    master    bar
bar-lobby            https://github.com/Serpensor/bar-lobby.git             master    bar,chobby
bar_debug_launcher   https://github.com/Serpensor/bar_debug_launcher.git    main      bar,recoil,chobby

# ---------------------------------------------------------------------------
# recoil — Recoil engine + Lua tooling that operates on engine source
# ---------------------------------------------------------------------------

RecoilEngine         https://github.com/Serpensor/RecoilEngine.git         master    recoil
lua-doc-extractor    https://github.com/Serpensor/lua-doc-extractor.git    main      recoil

# ---------------------------------------------------------------------------
# teiserver — Teiserver lobby/matchmaking server, SPADS config, public APIs
# ---------------------------------------------------------------------------

teiserver            https://github.com/Serpensor/teiserver.git             main      teiserver
spads_config_bar     https://github.com/Serpensor/spads_config_bar.git      main      teiserver
bar-db               https://github.com/Serpensor/bar-db.git                master    teiserver
bar-live-services    https://github.com/Serpensor/bar-live-services.git     main      teiserver

# ---------------------------------------------------------------------------
# chobby — Chobby in-game lobby
# ---------------------------------------------------------------------------

BYAR-Chobby          https://github.com/Serpensor/BYAR-Chobby.git           master    chobby

# ---------------------------------------------------------------------------
# spads-source — SPADS autohost source (optional, for SPADS dev only)
# ---------------------------------------------------------------------------

SPADS                https://github.com/Serpensor/SPADS.git                            master    spads-source
SpringLobbyInterface https://github.com/Serpensor/SpringLobbyInterface.git             master    spads-source
ansible-spads-setup  https://github.com/Serpensor/ansible-spads-setup.git   main      spads-source
